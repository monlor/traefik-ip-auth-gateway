services:
  traefik:
    image: traefik:v3.4
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.websecure.address=:443
    ports:
      - "443:443"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  authelia:
    image: authelia/authelia:4
    networks:
      - proxy

  auth-gateway:
    build: .
    volumes:
      - ./config.example.yml:/app/config.yml:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.auth-forward.forwardauth.address=http://auth-gateway:8080
      - traefik.http.middlewares.auth-forward.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.auth-forward.forwardauth.authResponseHeaders=Remote-User,Remote-Groups

  whoami:
    image: traefik/whoami:v1.11
    labels:
      - traefik.enable=true
      - traefik.http.routers.whoami.rule=Host(`app.example.com`)
      - traefik.http.routers.whoami.entrypoints=websecure
      - traefik.http.routers.whoami.tls=true
      - traefik.http.routers.whoami.middlewares=auth-forward@docker
      - traefik.http.services.whoami.loadbalancer.server.port=80
    networks:
      - proxy

networks:
  proxy:
    name: proxy
